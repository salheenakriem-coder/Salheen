<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم احترافية</title>
    <style>
        body { font-family: sans-serif; background-color: #e9ecef; padding: 20px; text-align: center; }
        .card { max-width: 450px; background: white; border-radius: 15px; padding: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); margin: auto; }
        h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .info { text-align: right; margin: 20px 0; line-height: 1.8; }
        .btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        .btn-reboot { background-color: #e74c3c; } /* أحمر لإعادة التشغيل */
        .btn-scan { background-color: #3498db; }   /* أزرق للبحث */
        button:hover { opacity: 0.8; }
    </style>
</head>
<body>

<div class="card">
    <h2>إعدادات الهوائي - فني الشبكات</h2>
    
    <div class="info">
        <strong>📡 جودة الإشارة:</strong> <span style="color: green;">-52 dBm (قوية جداً)</span><br>
        <strong>🌐 موفر الخدمة:</strong> LTT 4G / HighSpeed<br>
        <strong>🕒 وقت التشغيل:</strong> 12 ساعة و 30 دقيقة
    </div>

    <div class="btn-group">
        <button class="btn-scan" onclick="alert('جاري البحث عن أبراج قريبة...')">بحث عن شبكات</button>
        <button class="btn-reboot" onclick="confirm('هل أنت متأكد من إعادة تشغيل الهوائي؟')">إعادة تشغيل</button>
    </div>
</div>

<script>
    console.log("واجهة التحكم جاهزة للعمل يا صالحين!");
</script>
<div class="card" style="margin-top: 20px; border-top: 3px solid #f39c12;">
    <h3>تغيير إعدادات الشبكة (للفنيين فقط)</h3>
    <p>عنوان IP الحالي: <input type="text" value="192.168.1.20" id="ipInput"></p>
    <button style="background-color: #f39c12;" onclick="saveIP()">حفظ الإعدادات الجديدة</button>
</div>

<script>
function saveIP() {
    let newIP = document.getElementById('ipInput').value;
    alert("جاري تغيير العنوان إلى: " + newIP + "\nسيتم إعادة تشغيل الجهاز لتطبيق التغييرات.");
}
</script>

</body>
</html>
